<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ledebe Browser Protector</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup-shell">
    <section class="popup-hero">
      <div class="popup-kicker">Ledebe Browser Protector</div>
      <h1>Mask sensitive data before it reaches the AI.</h1>
      <p>Values are swapped for placeholders as you type or paste into ChatGPT, Claude, Gemini, and other AI chats — and revealed again in the reply.</p>
      <div class="version-chip" id="extension-version">v1.0.1</div>
    </section>

    <section class="popup-panel">
      <div class="status-row">
        <span class="status-label">Current site</span>
        <strong id="current-host">Loading...</strong>
      </div>
      <div class="status-row">
        <span class="status-label">In the active field</span>
        <strong id="finding-count">—</strong>
      </div>
    </section>

    <section class="popup-panel">
      <label class="toggle-row">
        <span>
          <strong>Protection on</strong>
          <small>Master switch for detection and masking.</small>
        </span>
        <input type="checkbox" id="enabled-toggle">
      </label>
      <label class="toggle-row">
        <span>
          <strong>Replace as I type on AI sites</strong>
          <small>Swap each value for a placeholder live, before send.</small>
        </span>
        <input type="checkbox" id="auto-replace-toggle">
      </label>
      <label class="toggle-row">
        <span>
          <strong>Scan on paste</strong>
          <small>Mask sensitive data in text you paste in.</small>
        </span>
        <input type="checkbox" id="paste-toggle">
      </label>
      <label class="toggle-row">
        <span>
          <strong>Reveal in AI responses</strong>
          <small>Restore your real values where the AI echoes a placeholder.</small>
        </span>
        <input type="checkbox" id="restore-responses-toggle">
      </label>
      <label class="toggle-row">
        <span>
          <strong>Remember across restarts</strong>
          <small>Keep restoring older chats after the browser closes. Stays on this device.</small>
        </span>
        <input type="checkbox" id="persist-toggle">
      </label>
    </section>

    <section class="popup-panel">
      <label class="field-label" for="custom-terms">Always protect these words</label>
      <textarea id="custom-terms" rows="3" placeholder="One per line — names, project codes, client terms…"></textarea>
      <button class="btn btn-secondary" id="save-terms-btn" style="width:100%;margin-top:8px;">Save words</button>
    </section>

    <section class="popup-actions">
      <button class="btn btn-primary" id="protect-btn">Protect active field</button>
      <button class="btn btn-secondary" id="open-panel-btn">Open panel</button>
      <button class="btn btn-secondary" id="pause-btn">Pause on this site</button>
      <button class="btn btn-secondary" id="clear-data-btn">Clear saved data</button>
    </section>
    <div id="status"></div>
  </main>
  <script src="popup.js"></script>
</body>
</html>
