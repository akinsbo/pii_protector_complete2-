<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PII Protector</title>
    <style>
        :root {
            --primary-blue: #1e3a8a;
            --accent-green: #4ade80;
            --dark-green: #16a34a;
            --text-dark: #1f2937;
            --text-gray: #6b7280;
            --bg-light: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
        }

        .app-container {
            max-width: 800px;
            margin: 2rem auto;
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .app-header {
            background: var(--primary-blue);
            color: white;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .app-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .app-content {
            padding: 2rem;
        }

        .control-section {
            background: var(--bg-light);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .row {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .toggle {
            position: relative;
            width: 50px;
            height: 28px;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e1;
            transition: 0.3s;
            border-radius: 28px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent-green);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        .input-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .prompt-section {
            display: flex;
            flex-direction: column;
        }

        .custom-terms-section {
            display: flex;
            flex-direction: column;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .helper-text {
            font-size: 0.85rem;
            color: var(--text-gray);
            margin-bottom: 0.75rem;
            font-style: italic;
        }

        textarea {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
            transition: all 0.3s ease;
        }

        .prompt-input {
            min-height: 150px;
            max-height: 400px;
            border-color: var(--accent-green);
            box-shadow: 0 0 0 1px rgba(74, 222, 128, 0.1);
        }

        .custom-terms-input {
            min-height: 120px;
            max-height: 200px;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 1px rgba(30, 58, 138, 0.1);
        }

        textarea:focus {
            outline: none;
            transform: scale(1.01);
        }

        .prompt-input:focus {
            border-color: var(--dark-green);
            box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.2);
        }

        .custom-terms-input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.2);
        }

        textarea[readonly] {
            background: var(--bg-light);
            color: var(--text-gray);
            cursor: default;
            border-color: var(--border);
            box-shadow: none;
        }

        textarea[readonly]:focus {
            transform: none;
            box-shadow: none;
        }

        .button-container {
            text-align: center;
            margin: 2rem 0;
        }

        .process-btn {
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .process-btn:hover {
            background: var(--dark-green);
            transform: translateY(-2px);
        }

        .results {
            display: grid;
            gap: 1.5rem;
        }

        @media (min-width: 768px) {
            .results {
                grid-template-columns: 1fr 1fr;
            }
        }

        .result-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .result-header {
            background: var(--bg-light);
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-header h4 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .copy-btn {
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            background: var(--dark-green);
            transform: translateY(-1px);
        }

        .copy-btn:active {
            transform: translateY(0);
        }

        .result-content {
            padding: 1rem;
        }

        .feedback-section {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        .feedback-form {
            background: var(--bg-light);
            border-radius: 8px;
            padding: 1.5rem;
            border: 1px solid var(--border);
        }

        .feedback-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        #feedback-email {
            flex: 1;
            padding: 0.75rem;
            border: 2px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
        }

        #feedback-email:focus {
            outline: none;
            border-color: var(--accent-green);
        }

        .feedback-btn {
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .feedback-btn:hover {
            background: var(--dark-green);
        }

        .feedback-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .app-container {
                margin: 1rem;
            }
            .input-layout {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            .feedback-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <h2>PII Protection Tool</h2>
        </div>
        
        <div class="app-content">
            <div class="control-section">
                <div class="row">
                    <label class="toggle">
                        <input id="protect" type="checkbox" checked>
                        <span class="slider"></span>
                    </label>
                    <span>Enable PII Protection</span>
                    <span id="shield">🛡️</span>
                </div>
            </div>

            <div class="input-layout">
                <div class="prompt-section">
                    <h3 class="section-title">Your Prompt</h3>
                    <textarea id="input" class="prompt-input" placeholder="Type or paste your text here for protection or restoration..."></textarea>
                </div>
                
                <div class="custom-terms-section">
                    <h3 class="section-title">Custom Terms</h3>
                    <p class="helper-text">One term per line</p>
                    <textarea id="customTerms" class="custom-terms-input" placeholder="company-name&#10;project-code&#10;secret-key"></textarea>
                </div>
            </div>

            <div class="button-container">
                <button id="send" class="process-btn">Process Text</button>
            </div>

            <div class="results">
                <div class="result-card">
                    <div class="result-header">
                        <h4>Protected Prompt</h4>
                        <button class="copy-btn" data-target="protected-prompt">📋 Copy</button>
                    </div>
                    <div class="result-content">
                        <textarea id="protected-prompt" readonly></textarea>
                    </div>
                </div>
                
                <div class="result-card">
                    <div class="result-header">
                        <h4>Restored Result</h4>
                        <button class="copy-btn" data-target="output">📋 Copy</button>
                    </div>
                    <div class="result-content">
                        <textarea id="output" readonly></textarea>
                    </div>
                </div>
            </div>

            <div class="feedback-section">
                <h3 class="section-title">Send Feedback</h3>
                <div class="feedback-form">
                    <textarea id="feedback-text" placeholder="Share your thoughts, report issues, or suggest improvements..."></textarea>
                    <div class="feedback-actions">
                        <input type="email" id="feedback-email" placeholder="Your email (optional)">
                        <button id="send-feedback" class="feedback-btn">Send Feedback</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script type="module" src="/src/renderer.ts"></script>
</body>
</html>
