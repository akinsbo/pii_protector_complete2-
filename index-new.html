<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ledebe Protector</title>
    <style>
        :root {
            --primary-blue: #1e3a8a;
            --accent-green: #4ade80;
            --text-dark: #1f2937;
            --text-gray: #6b7280;
            --bg-light: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
        }

        [data-theme="dark"] {
            --primary-blue: #3b82f6;
            --accent-green: #10b981;
            --text-dark: #f9fafb;
            --text-gray: #d1d5db;
            --bg-light: #1f2937;
            --white: #111827;
            --border: #374151;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* Left Sidebar */
        .history-sidebar {
            width: 280px;
            background: var(--white);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .history-header {
            padding: 1rem;
            background: var(--primary-blue);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-header h3 {
            font-size: 1rem;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }

        .close-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .history-item {
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background: var(--bg-light);
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .history-item:hover {
            border-color: var(--accent-green);
        }

        .history-item.active {
            background: var(--accent-green);
            color: white;
        }

        .history-item-text {
            font-size: 0.85rem;
            margin-bottom: 0.25rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .history-item-date {
            font-size: 0.7rem;
            opacity: 0.7;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .panels-container {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            padding: 1rem;
            overflow: hidden;
        }

        .panel {
            background: var(--white);
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            background: var(--bg-light);
        }

        .tab {
            flex: 1;
            padding: 0.75rem 1rem;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-gray);
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab:hover {
            background: rgba(0,0,0,0.05);
        }

        .tab.active {
            color: var(--primary-blue);
            border-bottom-color: var(--primary-blue);
            background: var(--white);
        }

        .panel-content {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
        }

        .panel-content textarea {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            resize: none;
            font-family: inherit;
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-dark);
            outline: none;
        }

        /* Bottom Input */
        .input-container {
            padding: 1rem;
            border-top: 1px solid var(--border);
            background: var(--white);
        }

        .input-wrapper {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .input-wrapper input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border);
            border-radius: 24px;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-wrapper input:focus {
            border-color: var(--primary-blue);
        }

        .action-btn {
            padding: 0.75rem 1.5rem;
            background: var(--accent-green);
            color: white;
            border: none;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: #22c55e;
            transform: translateY(-1px);
        }

        .action-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* Dark Mode Toggle */
        .dark-mode-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 1000;
        }

        .toggle {
            position: relative;
            width: 50px;
            height: 28px;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e1;
            transition: 0.3s;
            border-radius: 28px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent-green);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }
    </style>
</head>
<body>
    <div class="dark-mode-toggle">
        <label class="toggle">
            <input id="darkMode" type="checkbox">
            <span class="slider"></span>
        </label>
    </div>

    <div class="app-container">
        <!-- Left Sidebar -->
        <div class="history-sidebar">
            <div class="history-header">
                <h3>📚 History</h3>
                <button class="close-btn" onclick="alert('Close functionality')">&times;</button>
            </div>
            <div class="history-list" id="history-list">
                <div class="history-item active">
                    <div class="history-item-text">Hi there. Your name is Sandra</div>
                    <div class="history-item-date">2 minutes ago</div>
                </div>
                <div class="history-item">
                    <div class="history-item-text">My email is john@example.com</div>
                    <div class="history-item-date">5 minutes ago</div>
                </div>
                <div class="history-item">
                    <div class="history-item-text">Call me at +1-555-1234</div>
                    <div class="history-item-date">10 minutes ago</div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="panels-container">
                <!-- Left Panel -->
                <div class="panel">
                    <div class="panel-tabs">
                        <button class="tab active" onclick="switchTab(this, 'left')">Restored Response</button>
                        <button class="tab" onclick="switchTab(this, 'left')">Actual Protected Text</button>
                    </div>
                    <div class="panel-content">
                        <textarea id="left-content" placeholder="Restored text will appear here...">Hi there. Your name is Sandra</textarea>
                    </div>
                </div>

                <!-- Right Panel -->
                <div class="panel">
                    <div class="panel-tabs">
                        <button class="tab active" onclick="switchTab(this, 'right')">Protected Text</button>
                        <button class="tab" onclick="switchTab(this, 'right')">Plain Text</button>
                    </div>
                    <div class="panel-content">
                        <textarea id="right-content" placeholder="Protected text will appear here...">Hi there. I am [LDB_CUSTOM1]</textarea>
                    </div>
                </div>
            </div>

            <!-- Bottom Input -->
            <div class="input-container">
                <div class="input-wrapper">
                    <input type="text" id="text-input" placeholder="Type text here..." />
                    <button class="action-btn" onclick="processText()">🛡️ Protect</button>
                    <button class="action-btn" onclick="restoreText()">🔄 Restore</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Dark mode toggle
        const darkMode = document.getElementById('darkMode');
        darkMode.addEventListener('change', function() {
            document.documentElement.setAttribute('data-theme', darkMode.checked ? 'dark' : 'light');
            localStorage.setItem('darkMode', darkMode.checked);
        });

        // Load saved dark mode
        const savedDarkMode = localStorage.getItem('darkMode') === 'true';
        darkMode.checked = savedDarkMode;
        document.documentElement.setAttribute('data-theme', savedDarkMode ? 'dark' : 'light');

        // Tab switching
        function switchTab(clickedTab, panel) {
            const tabs = clickedTab.parentElement.querySelectorAll('.tab');
            tabs.forEach(tab => tab.classList.remove('active'));
            clickedTab.classList.add('active');
        }

        // History item click
        document.querySelectorAll('.history-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.history-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Placeholder map for protection/restoration
        let placeholderMap = {};
        let protectedText = '';

        // Process text (protect)
        function processText() {
            const input = document.getElementById('text-input');
            const text = input.value.trim();
            
            if (!text) return;

            placeholderMap = {};
            let masked = text;
            let count = 0;

            // Mask emails
            masked = masked.replace(/\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b/g, function(match) {
                count++;
                const placeholder = '[LDB_EMAIL' + count + ']';
                placeholderMap[placeholder] = match;
                return placeholder;
            });

            // Mask phones
            masked = masked.replace(/\+?[1-9]\d{1,14}|\(?\d{3}\)?[-\s]?\d{3}[-\s]?\d{4}/g, function(match) {
                count++;
                const placeholder = '[LDB_PHONE' + count + ']';
                placeholderMap[placeholder] = match;
                return placeholder;
            });

            // Mask names (simple example - you can enhance this)
            const names = ['Sandra', 'John', 'Mary', 'David'];
            names.forEach(name => {
                const regex = new RegExp('\\b' + name + '\\b', 'gi');
                masked = masked.replace(regex, function(match) {
                    count++;
                    const placeholder = '[LDB_CUSTOM' + count + ']';
                    placeholderMap[placeholder] = match;
                    return placeholder;
                });
            });

            protectedText = masked;
            document.getElementById('right-content').value = masked;
            document.getElementById('left-content').value = text;
            input.value = '';
        }

        // Restore text
        function restoreText() {
            const rightContent = document.getElementById('right-content').value;
            let restored = rightContent;

            for (const placeholder in placeholderMap) {
                restored = restored.replace(new RegExp(placeholder.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g'), placeholderMap[placeholder]);
            }

            document.getElementById('left-content').value = restored;
        }

        // Handle Enter key in input
        document.getElementById('text-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                processText();
            }
        });
    </script>
</body>
</html>
