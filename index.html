<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PII Protector</title>
    <style>
        :root {
            --primary-blue: #1e3a8a;
            --accent-green: #4ade80;
            --dark-green: #16a34a;
            --text-dark: #1f2937;
            --text-gray: #6b7280;
            --bg-light: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
        }

        [data-theme="dark"] {
            --primary-blue: #3b82f6;
            --accent-green: #10b981;
            --dark-green: #059669;
            --text-dark: #f9fafb;
            --text-gray: #d1d5db;
            --bg-light: #1f2937;
            --white: #111827;
            --border: #374151;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
        }

        .app-container {
            max-width: 800px;
            margin: 1rem auto;
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            height: calc(100vh - 2rem);
            display: flex;
            flex-direction: column;
        }

        .app-header {
            background: var(--primary-blue);
            color: white;
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo {
            display: flex;
            align-items: center;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: white;
            font-size: 0.9rem;
        }

        .app-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .app-content {
            padding: 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .control-section {
            background: var(--bg-light);
            border-radius: 6px;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
        }

        .row {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .toggle {
            position: relative;
            width: 50px;
            height: 28px;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e1;
            transition: 0.3s;
            border-radius: 28px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent-green);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        .input-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
            flex: 1;
            min-height: 0;
        }

        .prompt-section {
            display: flex;
            flex-direction: column;
        }

        .custom-terms-section {
            display: flex;
            flex-direction: column;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .helper-text {
            font-size: 0.85rem;
            color: var(--text-gray);
            margin-bottom: 0.75rem;
            font-style: italic;
        }

        textarea {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
            transition: all 0.3s ease;
        }

        .prompt-input {
            height: 100%;
            min-height: 120px;
            border-color: var(--accent-green);
            box-shadow: 0 0 0 1px rgba(74, 222, 128, 0.1);
        }

        .custom-terms-input {
            height: 100%;
            min-height: 80px;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 1px rgba(30, 58, 138, 0.1);
        }

        textarea:focus {
            outline: none;
            transform: scale(1.01);
        }

        .prompt-input:focus {
            border-color: var(--dark-green);
            box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.2);
        }

        .custom-terms-input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.2);
        }

        textarea[readonly] {
            background: var(--bg-light);
            color: var(--text-gray);
            cursor: default;
            border-color: var(--border);
            box-shadow: none;
        }

        textarea[readonly]:focus {
            transform: none;
            box-shadow: none;
        }

        .button-container {
            text-align: center;
            margin: 0.75rem 0;
        }

        .process-btn {
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .process-btn:hover {
            background: var(--dark-green);
            transform: translateY(-2px);
        }

        .results {
            display: grid;
            gap: 1rem;
            flex: 1;
            min-height: 0;
        }

        @media (min-width: 768px) {
            .results {
                grid-template-columns: 1fr 1fr;
            }
        }

        .result-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .result-header {
            background: var(--bg-light);
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-header h4 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .copy-btn {
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            background: var(--dark-green);
            transform: translateY(-1px);
        }

        .copy-btn:active {
            transform: translateY(0);
        }

        .result-content {
            padding: 0.75rem;
            height: 120px;
        }

        .result-content textarea {
            height: 100%;
            min-height: unset;
        }

        .feedback-section {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        .feedback-form {
            background: var(--bg-light);
            border-radius: 8px;
            padding: 1.5rem;
            border: 1px solid var(--border);
        }

        .feedback-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        #feedback-email {
            flex: 1;
            padding: 0.75rem;
            border: 2px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
        }

        #feedback-email:focus {
            outline: none;
            border-color: var(--accent-green);
        }

        .feedback-btn {
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .feedback-btn:hover {
            background: var(--dark-green);
        }

        .feedback-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .feedback-compact {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            padding: 0.75rem;
            background: var(--bg-light);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .feedback-compact #feedback-text {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .feedback-compact .feedback-btn {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .app-container {
                margin: 1rem;
            }
            .input-layout {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            .feedback-actions {
                flex-direction: column;
            }
            .feedback-compact {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <div class="header-left">
                <div class="logo">
                    <svg width="32" height="32" viewBox="0 0 512 512">
                        <defs>
                            <radialGradient id="lightGrad" cx="50%" cy="30%" r="70%">
                                <stop offset="0%" style="stop-color:#fbbf24"/>
                                <stop offset="100%" style="stop-color:#d97706"/>
                            </radialGradient>
                        </defs>
                        <circle cx="256" cy="256" r="240" fill="#0f172a"/>
                        <circle cx="256" cy="256" r="80" fill="url(#lightGrad)"/>
                        <text x="256" y="290" text-anchor="middle" dominant-baseline="middle" fill="#fef3c7" font-family="serif" font-weight="bold" font-size="80">LDB</text>
                    </svg>
                </div>
                <h2>Ledebe Protector</h2>
            </div>
            <div class="header-controls">
                <label class="toggle">
                    <input id="darkMode" type="checkbox">
                    <span class="slider"></span>
                </label>
                <span>Dark</span>
                <label class="toggle">
                    <input id="protect" type="checkbox" checked>
                    <span class="slider"></span>
                </label>
                <span>Protection</span>
                <span id="shield">🛡️</span>
                <button id="settings-btn" style="background: none; border: none; color: white; cursor: pointer; font-size: 1.2rem; margin-left: 1rem;" title="Settings">⚙️</button>
            </div>
        </div>
        
        <div class="app-content">


            <div class="input-layout">
                <div class="prompt-section">
                    <h3 class="section-title">Your Prompt</h3>
                    <textarea id="input" class="prompt-input" placeholder="Type or paste your text here for protection or restoration..."></textarea>
                </div>
                
                <div class="custom-terms-section">
                    <h3 class="section-title">Custom Terms</h3>
                    <p class="helper-text">One term per line</p>
                    <textarea id="customTerms" class="custom-terms-input" placeholder="company-name&#10;project-code&#10;secret-key"></textarea>
                </div>
            </div>

            <div class="button-container">
                <button id="send" class="process-btn">Process Text</button>
            </div>

            <div class="results">
                <div class="result-card">
                    <div class="result-header">
                        <h4>Protected Prompt</h4>
                        <button class="copy-btn" data-target="protected-prompt">📋 Copy</button>
                    </div>
                    <div class="result-content">
                        <textarea id="protected-prompt" readonly></textarea>
                    </div>
                </div>
                
                <div class="result-card">
                    <div class="result-header">
                        <h4>Restored Result</h4>
                        <button class="copy-btn" data-target="output">📋 Copy</button>
                    </div>
                    <div class="result-content">
                        <textarea id="output" readonly></textarea>
                    </div>
                </div>
            </div>

            <div class="feedback-compact">
                <input type="text" id="feedback-text" placeholder="💬 Quick feedback or suggestions...">
                <button id="send-feedback" class="feedback-btn">Send Feedback</button>
            </div>

        </div>
    </div>
    
    <!-- Settings Modal -->
    <div id="settings-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
        <div style="background: var(--white); margin: 2rem auto; padding: 2rem; border-radius: 8px; max-width: 500px; max-height: 80vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border);">
                <h3>Settings</h3>
                <button id="close-settings" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-gray);">&times;</button>
            </div>
            
            <div style="margin-bottom: 1.5rem;">
                <h4 style="margin-bottom: 0.5rem; color: var(--text-dark);">Default Custom Terms</h4>
                <p style="font-size: 0.85rem; color: var(--text-gray); margin-bottom: 0.75rem;">These terms will be automatically loaded when the app starts</p>
                <textarea id="settings-custom-terms" style="width: 100%; height: 120px; padding: 0.75rem; border: 2px solid var(--border); border-radius: 6px; font-family: inherit; resize: vertical;" placeholder="company-name&#10;project-code&#10;secret-key"></textarea>
            </div>
            
            <div style="margin-bottom: 1.5rem;">
                <h4 style="margin-bottom: 0.5rem; color: var(--text-dark);">Preferences</h4>
                <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem;">
                    <input type="checkbox" id="settings-auto-save" style="margin: 0;">
                    <label for="settings-auto-save" style="color: var(--text-dark);">Auto-save custom terms</label>
                </div>
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <input type="checkbox" id="settings-notifications" style="margin: 0;">
                    <label for="settings-notifications" style="color: var(--text-dark);">Show notifications</label>
                </div>
            </div>
            
            <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                <button id="cancel-settings" style="background: var(--border); color: var(--text-dark); border: none; padding: 0.75rem 1.5rem; border-radius: 6px; cursor: pointer;">Cancel</button>
                <button id="save-settings" style="background: var(--accent-green); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; cursor: pointer;">Save Settings</button>
            </div>
        </div>
    </div>
    
    <script type="module" src="/src/renderer.ts"></script>
</body>
</html>
