<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- White background -->
  <rect width="200" height="200" fill="#ffffff"/>

  <!-- Shield drop shadow -->
  <path d="M24,62 C24,34 46,20 100,20 C154,20 176,34 176,62 L176,118 Q176,172 100,192 Q24,172 24,118 Z"
    fill="#1a3070" opacity="0.15" transform="translate(3,5)"/>

  <!-- Shield body -->
  <path d="M24,62 C24,34 46,20 100,20 C154,20 176,34 176,62 L176,118 Q176,172 100,192 Q24,172 24,118 Z"
    fill="#1e3a8a"/>

  <!-- Inner highlight -->
  <path d="M34,64 C34,40 54,30 100,30 C146,30 166,40 166,64 L166,118 Q166,164 100,182 Q34,164 34,118 Z"
    fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.12"/>

  <!-- Padlock shackle -->
  <path d="M82,96 L82,80 Q82,62 100,62 Q118,62 118,80 L118,96"
    fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Padlock body amber -->
  <rect x="72" y="92" width="56" height="48" rx="10" fill="#f59e0b"/>
  <rect x="72" y="92" width="56" height="48" rx="10" fill="none" stroke="#d4860a" stroke-width="1.5"/>

  <!-- Keyhole -->
  <circle cx="100" cy="112" r="9" fill="#1e3a8a"/>
  <rect x="96.5" y="112" width="7" height="13" rx="3.5" fill="#1e3a8a"/>
</svg>
